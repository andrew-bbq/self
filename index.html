<!doctype html>
<html lang="en-GB">

<head>
    <meta charset="utf-8" />
    <title>Andrew Bennett (Go Play Outer Wilds)</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <script src="./scripts/writing.js" type="module"></script>
</head>

<body>
    <div id="andrew-title-overlay"></div>
    <div class="bennett-title-overlay" id="bennett-base"></div>
    <div class="bennett-title-overlay" id="bennett-bbottom"></div>
    <div class="bennett-title-overlay" id="bennett-bmiddle"></div>
    <div class="bennett-title-overlay" id="bennett-e1top"></div>
    <div class="bennett-title-overlay" id="bennett-e2bottomleft"></div>
    <div class="bennett-title-overlay" id="bennett-e2bottomright"></div>
    <div class="bennett-title-overlay" id="bennett-e2fragment"></div>
    <div class="bennett-title-overlay" id="bennett-e2top"></div>
    <div class="bennett-title-overlay" id="bennett-n1top"></div>
    <div class="bennett-title-overlay" id="bennett-n2top"></div>
    <div id="top-bar" class="title-bar"></div>
    <div id="bottom-bar" class="title-bar"></div>
    <div class="menu-option" id="about-me">
        <a onclick="writeSpiral('about-me-spiral-1')">ABOUT ME</a>
    </div>
    <div class="menu-option" id="education">
        <a onclick="writeSpiral('education-spiral-1')">EDUCATION</a>
    </div>
    <div class="menu-option" id="experience">
        <a onclick="writeSpiral('experience-spiral-1')">EXPERIENCE</a>
    </div>
    <div class="menu-option" id="projects">
        <a onclick="writeSpiral('projects-spiral-1')">PROJECTS</a>
    </div>
    <div id="about-me-spiral-1" onmouseover="showSpiralText('about-me-spiral-1')"
        onclick="translateSpiral('about-me-spiral-1')">
        <svg viewBox="-190 -250 260 350" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
                <filter id="scribble">
                    <feTurbulence type="turbulence" baseFrequency="0.8" numOctaves="10" result="noise" />
                    <feDisplacementMap in="SourceGraphic" in2="noise" scale="25" xChannelSelector="R"
                        yChannelSelector="G" />
                </filter>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="8" />
                </filter>
            </defs>
            <path id="nomai-path-spiral-1" class="nomai-writing-main-path unread" pathLength="1" filter="url(#scribble)"
                d="M -81 82 Q -25 55 12 7 Q 57 -49 45 -148 Q 31 -217 -43 -225 Q -114 -230 -148 -182 Q -180 -130 -156 -91 Q -125 -55 -95 -55 Q -36 -58 -36 -98" />
            <path class="nomai-writing-blur unread" pathLength="1" filter="url(#glow)"
                d="M -81 82 Q -25 55 12 7 Q 57 -49 45 -148 Q 31 -217 -43 -225 Q -114 -230 -148 -182 Q -180 -130 -156 -91 Q -125 -55 -95 -55 Q -36 -58 -36 -98" />
            <g class="nomai-scan-group">
                <line class="nomai-scan-line" x1="0" y1="-20" x2="0" y2="20">
                    <animateMotion dur="1.5s" repeatCount="indefinite" rotate="auto" keyPoints="0;1;0"
                        keyTimes="0;0.5;1" calcMode="linear">
                        <mpath href="#nomai-path-spiral-1" />
                    </animateMotion>
                </line>
                <line class="nomai-scan-line" x1="0" y1="-25" x2="0" y2="25">
                    <animateMotion dur="1.5s" repeatCount="indefinite" rotate="auto" keyPoints="1;0;1"
                        keyTimes="0;0.5;1" calcMode="linear">
                        <mpath href="#nomai-path-spiral-1" />
                    </animateMotion>
                </line>
                <line class="nomai-scan-line" x1="0" y1="-15" x2="0" y2="15">
                    <animateMotion dur="2s" repeatCount="indefinite" rotate="auto" keyPoints="1;0;1" keyTimes="0;0.5;1"
                        calcMode="linear">
                        <mpath href="#nomai-path-spiral-1" />
                    </animateMotion>
                </line>
            </g>
        </svg>
    </div>
    <div id="education-spiral-1" onmouseover"showSpiralText('education-spiral-1')" onclick="translateSpiral('education-spiral-1')">
    </div>
    <div id="translator-popup">
        <p id="translator-text">&lt;!&gt; Untranslated Nomai writing &lt;!&gt;</p>
        <img src="./assets/translator.png" alt="" />
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@v0.149.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@v0.149.0/examples/jsm/"
            }
        }
    </script>
    <script src="index.js" type="module"></script>
</body>

</html>
